name: CI

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t multiplayer-service:${{ github.sha }} .

      - name: Run Docker container
        run: |
          docker rm -f multiplayer-service || true
          docker run -d --name multiplayer-service -p 4000:4000 multiplayer-service:${{ github.sha }}

      - name: Verify deployment
        run: |
          for i in {1..15}; do
            if curl -fsS http://127.0.0.1:4000/health; then
              exit 0
            fi
            sleep 2
          done
          docker logs multiplayer-service
          exit 1
