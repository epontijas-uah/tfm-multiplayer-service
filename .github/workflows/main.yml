name: CI

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t multiplayer-service:${{ github.sha }} .

      - name: Run Docker container
        shell: powershell
        run: |
          $null = docker rm -f multiplayer-service 2>$null
          docker run -d --name multiplayer-service -p 4000:4000 multiplayer-service:${{ github.sha }}

      - name: Verify deployment
        shell: powershell
        run: |
          for ($i = 1; $i -le 15; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:4000/health" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) { exit 0 }
            } catch {}
            Start-Sleep -Seconds 2
          }
          docker logs multiplayer-service
          exit 1
